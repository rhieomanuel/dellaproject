<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Della Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-zinc-900 text-white p-4 sticky top-0 shadow-lg z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider text-amber-500">DELLA PROJECT</h1>
            <button onclick="toggleKeranjang()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg relative font-medium transition">
                🛒 Keranjang 
                <span id="hitung-keranjang" class="absolute -top-2 -right-2 bg-amber-500 text-zinc-900 text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-2">
            <h2 class="text-xl font-bold mb-6 text-zinc-800 border-b pb-2">Keychain Hot Wheels</h2>
            <div id="etalase" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                </div>
        </section>

        <aside id="sidebar-keranjang" class="bg-white p-6 rounded-xl shadow-md h-fit sticky top-24 border border-gray-100 block">
            <h2 class="text-xl font-bold mb-4 text-zinc-800">Detail Pesanan</h2>
            
            <div id="item-keranjang" class="space-y-4 max-h-48 overflow-y-auto mb-4">
                <p class="text-gray-400 text-sm italic">Keranjang belanja kosong.</p>
            </div>
            
            <hr class="my-4 border-gray-200">
            
            <div class="flex justify-between font-bold text-lg text-zinc-900 mb-6">
                <span>Total:</span>
                <span id="total-harga">Rp 0</span>
            </div>

            <form id="form-checkout" action="https://formspree.io/f/xgobroge" method="POST" onsubmit="validasiCheckout(event)" class="space-y-4">
                <h3 class="text-sm font-semibold text-zinc-700 uppercase tracking-wider">Data Pembeli & Pembayaran</h3>
                
                <input type="hidden" name="Detail Pesanan" id="input-detail-pesanan">
                <input type="hidden" name="Total Bayar" id="input-total-bayar">

                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Nama Lengkap</label>
                    <input type="text" name="Nama" required class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500 focus:outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Nomor WhatsApp</label>
                    <input type="tel" name="WhatsApp" placeholder="08xxxxxxxxxx" required class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500 focus:outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Alamat Pengiriman</label>
                    <textarea name="Alamat" rows="2" required class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500 focus:outline-none text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Metode Transfer</label>
                    <select name="Metode Bank" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500 focus:outline-none text-sm bg-white">
                        <option value="DANA - 0881-0108-74207 a/n Della">DANA - 0881-0108-74207 a/n Della</option>
                        <option value="SHOPEE - 0822-9984-9811 a/n Della">SHOPEE - 0822-9984-9811 a/n Della</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                    Konfirmasi Pembayaran
                </button>
            </form>
        </aside>

    </main>

    <script>
        // Data Produk Sesuai Tulisan Awal & Harga Rata Rp 170.000 dengan Gambar yang Pasti Muncul
        const produk = [
            { 
                id: 1, 
                nama: "Brians Nissan Skyline R32", 
                harga: 135000, 
                gambar: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=500&auto=format&fit=crop" 
            },
            { 
                id: 2, 
                nama: "Nisan skyline Gtr R32 Godzilla", 
                harga: 170000, 
                gambar: "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?w=500&auto=format&fit=crop" 
            },
            { 
                id: 3, 
                nama: "Honda S2000 Fast & Furious", 
                harga: 180000, 
                gambar: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500&auto=format&fit=crop" 
            }
        ];

        let keranjang = [];

        // Render Etalase
        function tampilkanEtalase() {
            const etalaseEl = document.getElementById('etalase');
            etalaseEl.innerHTML = produk.map(p => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between transition hover:shadow-md">
                    <img src="${p.gambar}" alt="${p.nama}" class="w-full h-48 object-cover bg-gray-200">
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-zinc-800 text-md leading-snug">${p.nama}</h3>
                            <p class="text-amber-600 font-extrabold mt-2 text-lg">Rp ${p.harga.toLocaleString('id-ID')}</p>
                        </div>
                        <button onclick="tambahKeKeranjang(${p.id})" class="mt-4 w-full bg-zinc-900 hover:bg-zinc-800 text-white font-medium py-2 rounded-lg transition text-sm">
                            + Tambah ke Keranjang
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function tambahKeKeranjang(idProduk) {
            const produkDipilih = produk.find(p => p.id === idProduk);
            const itemDiKeranjang = keranjang.find(item => item.id === idProduk);

            if (itemDiKeranjang) {
                itemDiKeranjang.jumlah += 1;
            } else {
                keranjang.push({ ...produkDipilih, Residential: 1, jumlah: 1 });
            }
            updateKeranjang();
        }

        function deleteItem(idProduk) {
            keranjang = keranjang.filter(item => item.id !== idProduk);
            updateKeranjang();
        }

        function updateKeranjang() {
            const itemKeranjangEl = document.getElementById('item-keranjang');
            const totalHargaEl = document.getElementById('total-harga');
            const hitungKeranjangEl = document.getElementById('hitung-keranjang');
            
            const totalItem = keranjang.reduce((sum, item) => sum + item.jumlah, 0);
            hitungKeranjangEl.textContent = totalItem;
            totalItem > 0 ? hitungKeranjangEl.classList.remove('hidden') : hitungKeranjangEl.classList.add('hidden');

            if (keranjang.length === 0) {
                itemKeranjangEl.innerHTML = '<p class="text-gray-400 text-sm italic">Keranjang belanja kosong.</p>';
                totalHargaEl.textContent = 'Rp 0';
                document.getElementById('input-detail-pesanan').value = "";
                document.getElementById('input-total-bayar').value = "";
                return;
            }

            let totalHarga = 0;
            let teksPesanan = [];

            itemKeranjangEl.innerHTML = keranjang.map(item => {
                const subTotal = item.harga * item.jumlah;
                totalHarga += subTotal;
                teksPesanan.push(`${item.nama} (${item.jumlah}x)`);
                return `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg text-xs border border-gray-100">
                        <div class="pr-2">
                            <p class="font-bold text-zinc-800">${item.nama}</p>
                            <p class="text-gray-500 mt-0.5">${item.jumlah} pcs x Rp 170.000</p>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="text-red-500 hover:text-red-700 font-semibold shrink-0">Hapus</button>
                    </div>
                `;
            }).join('');

            totalHargaEl.textContent = `Rp ${totalHarga.toLocaleString('id-ID')}`;
            
            document.getElementById('input-detail-pesanan').value = teksPesanan.join(', ');
            document.getElementById('input-total-bayar').value = `Rp ${totalHarga.toLocaleString('id-ID')}`;
        }

        function toggleKeranjang() {
            const sidebar = document.getElementById('sidebar-keranjang');
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('block');
            } else {
                sidebar.classList.remove('block');
                sidebar.classList.add('hidden');
            }
        }

        function validasiCheckout(event) {
            if (keranjang.length === 0) {
                event.preventDefault();
                alert('Keranjang belanja Anda masih kosong!');
                return false;
            }
            alert('Mengirim data pesanan ke Della Project... Selesai!');
        }

        tampilkanEtalase();
    </script>
</body>
</html>
